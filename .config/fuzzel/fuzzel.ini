[main]
font = JetBrainsMono Nerd Font:size=12
icons-enabled = false
prompt = ""
dpi-aware = no
use-bold = false
inner-pad = 5
vertical-pad = 10
horizontal-pad = 10

[dmenu]
exit-immediately-if-empty = true

[border]
width = 0
radius = 0

[colors]
background = 181818FF
text = c1c1c1FF
match = 5f8787FF
placeholder = 9ECE6AFF
selection = c1c1c1FF
selection-text = 181818FF
selection-match = 1A1B26FF

[key-bindings]
delete-line-forward = none
next = Down Control+j
prev = Up Control+k
next-page = Shift+j
prev-page = Shift+k
